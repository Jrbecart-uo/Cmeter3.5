[env:waveshare_touch_lcd_35]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
; ESP32-S3-Touch-LCD-3.5 (non-B) has Octal (OPI) PSRAM and 16MB QIO flash
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
upload_speed = 921600
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    ; AXP2101 PMU
    -DXPOWERS_CHIP_AXP2101
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1

; GFX is vendored in lib/ — Waveshare's bundled 1.5.5 for the non-B
; ESP32-S3-Touch-LCD-3.5 (ST7796 over standard SPI). Its Arduino_ESP32SPI.cpp
; is patched for arduino-esp32 3.x; QSPI/SPIDMA databus files excluded.
; Touch = FT6336 via SensorLib's TouchDrvFT6X36 (no extra lib needed).
lib_deps =
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
